name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit:
    name: Unit tests (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift: ["6.0","6.1","6.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests in Swift Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace swift:${{ matrix.swift }} sh -c "swift --version && swift test --filter UnitTests"

  integration:
    name: Integration tests (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      matrix:
        swift: ["6.0","6.1","6.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docker network
        run: |
          docker network create mosq-net || true

      - name: Start Mosquitto broker
        run: |
          docker run -d --name mosquitto --network mosq-net -p 1883:1883 -p 1884:1884 \
            -v "$GITHUB_WORKSPACE/mosquitto/config":/mosquitto/config \
            -v "$GITHUB_WORKSPACE/mosquitto/data":/mosquitto/data \
            -v "$GITHUB_WORKSPACE/mosquitto/log":/mosquitto/log \
            eclipse-mosquitto:2.0.22
          for i in {1..30}; do
            if docker run --rm --network mosq-net busybox:1.36 sh -c "nc -z mosquitto 1883 && nc -z mosquitto 1884"; then
              exit 0
            fi

            echo "Mosquitto is not ready yet... (Attempt $i/30)"
            sleep 1
          done

          docker logs mosquitto
          exit 1

      - name: Run integration tests in Swift Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace --network mosq-net -e MQTT_TEST_HOST=mosquitto swift:${{ matrix.swift }} sh -c "swift --version && swift test --filter IntegrationTests"

      - name: Cleanup broker
        if: always()
        run: |
          docker rm -f mosquitto || true
          docker network rm mosq-net || true
