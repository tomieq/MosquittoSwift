name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  unit:
    name: Unit tests (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift: ["6.0","6.1","6.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests in Swift Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace swift:${{ matrix.swift }} sh -c "swift --version && swift test --filter UnitTests"

  integration:
    name: Integration tests (Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      matrix:
        swift: ["6.0","6.1","6.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create docker network
        run: |
          docker network create mosq-net || true

      - name: Start Mosquitto broker
        run: |
          docker run -d --name mosquitto --network mosq-net -p 1883:1883 \
            -v "$GITHUB_WORKSPACE/mosquitto/config":/mosquitto/config \
            -v "$GITHUB_WORKSPACE/mosquitto/data":/mosquitto/data \
            -v "$GITHUB_WORKSPACE/mosquitto/log":/mosquitto/log \
            eclipse-mosquitto:2.0.22
          # wait for broker to become ready
          for i in {1..10}; do docker logs mosquitto && break || sleep 1; done

      - name: Run integration tests in Swift Docker
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace --network mosq-net swift:${{ matrix.swift }} sh -c "swift --version && swift test --filter IntegrationTests"

      - name: Cleanup broker
        if: always()
        run: |
          docker rm -f mosquitto || true
          docker network rm mosq-net || true
